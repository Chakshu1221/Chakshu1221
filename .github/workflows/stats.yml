# ============================================================
# 🚀 All-in-One Profile Stats Generator
# Generates ALL stats SVGs and caches them in the output branch
# NO external service dependencies — your profile NEVER breaks!
# ============================================================
# Place this file at: .github/workflows/profile-stats.yml

name: Generate Profile Stats

on:
  # Runs every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Run on push to main
  push:
    branches:
      - main

  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Create output directory
        run: mkdir -p dist

      # ============================
      # 🐍 SNAKE ANIMATION
      # ============================
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # ============================
      # 🔥 STREAK STATS
      # ============================
      - name: Generate Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          user: Chakshu1221
          theme: tokyonight
          hide_border: true
          background: 0D1117
          ring: 6C5CE7
          fire: FFD700
          currStreakLabel: FFD700
          sideLabels: FFFFFF
          dates: 8B949E
          currStreakNum: 6C5CE7
          sideNums: FFD700
          path: dist/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ============================
      # 📊 GITHUB STATS CARD
      # ============================
      - name: Generate GitHub Stats Card
        run: |
          STATS_URL="https://github-readme-stats.vercel.app/api?username=Chakshu1221&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C5CE7&icon_color=FFD700&text_color=FFFFFF"

          # Fallback endpoints (in case primary is rate-limited)
          FALLBACK_1="https://github-readme-stats-git-master-anuraghazras-projects.vercel.app/api?username=Chakshu1221&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C5CE7&icon_color=FFD700&text_color=FFFFFF"
          FALLBACK_2="https://github-readme-stats.shion.dev/api?username=Chakshu1221&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C5CE7&icon_color=FFD700&text_color=FFFFFF"

          SUCCESS=false

          for URL in "$STATS_URL" "$FALLBACK_1" "$FALLBACK_2"; do
            for i in 1 2 3; do
              echo "⏳ Attempt $i — Fetching stats from: ${URL:0:60}..."
              curl -s -L --max-time 30 "$URL" -o dist/stats.svg
              if [ -f dist/stats.svg ] && grep -q "<svg" dist/stats.svg; then
                echo "✅ Stats SVG downloaded successfully!"
                SUCCESS=true
                break 2
              fi
              echo "⚠️ Attempt $i failed, waiting 30s..."
              sleep 30
            done
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ All stats endpoints failed — creating placeholder"
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195"><rect width="495" height="195" fill="#0D1117" rx="4.5"/><text x="248" y="105" fill="#6C5CE7" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16">Stats temporarily unavailable</text></svg>' > dist/stats.svg
          fi

      # ============================
      # 🗂️ TOP LANGUAGES CARD
      # ============================
      - name: Generate Top Languages Card
        run: |
          LANGS_URL="https://github-readme-stats.vercel.app/api/top-langs/?username=Chakshu1221&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C5CE7&text_color=FFFFFF&langs_count=10"

          FALLBACK_1="https://github-readme-stats-git-master-anuraghazras-projects.vercel.app/api/top-langs/?username=Chakshu1221&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C5CE7&text_color=FFFFFF&langs_count=10"
          FALLBACK_2="https://github-readme-stats.shion.dev/api/top-langs/?username=Chakshu1221&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=6C5CE7&text_color=FFFFFF&langs_count=10"

          SUCCESS=false

          for URL in "$LANGS_URL" "$FALLBACK_1" "$FALLBACK_2"; do
            for i in 1 2 3; do
              echo "⏳ Attempt $i — Fetching top languages from: ${URL:0:60}..."
              curl -s -L --max-time 30 "$URL" -o dist/top-langs.svg
              if [ -f dist/top-langs.svg ] && grep -q "<svg" dist/top-langs.svg; then
                echo "✅ Top Languages SVG downloaded successfully!"
                SUCCESS=true
                break 2
              fi
              echo "⚠️ Attempt $i failed, waiting 30s..."
              sleep 30
            done
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ All languages endpoints failed — creating placeholder"
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="350" height="195"><rect width="350" height="195" fill="#0D1117" rx="4.5"/><text x="175" y="105" fill="#6C5CE7" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16">Languages temporarily unavailable</text></svg>' > dist/top-langs.svg
          fi

      # ============================
      # 🏆 TROPHIES
      # ============================
      - name: Generate Trophies
        run: |
          PARAMS="username=Chakshu1221&theme=discord&no-frame=true&no-bg=true&column=7&margin-w=15"

          # Official volunteer load-balanced endpoints
          ENDPOINTS=(
            "https://github-profile-trophy-liard-delta.vercel.app"
            "https://github-profile-trophy-fork-two.vercel.app"
            "https://github-profile-trophy-winning.vercel.app"
            "https://github-profile-trophy-kannan.vercel.app"
            "https://trophy.benkou.dev"
            "https://github-profile-trophy.vercel.app"
          )

          SUCCESS=false

          for ENDPOINT in "${ENDPOINTS[@]}"; do
            echo "⏳ Trying trophies from: $ENDPOINT ..."
            curl -s -L --max-time 30 "${ENDPOINT}/?${PARAMS}" -o dist/trophies.svg
            if [ -f dist/trophies.svg ] && grep -q "<svg" dist/trophies.svg; then
              echo "✅ Trophies SVG downloaded from $ENDPOINT"
              SUCCESS=true
              break
            fi
            echo "⚠️ Failed, trying next endpoint..."
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ All trophy endpoints failed — creating placeholder"
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="130"><rect width="800" height="130" fill="transparent" rx="4.5"/><text x="400" y="72" fill="#6C5CE7" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16">🏆 Trophies temporarily unavailable</text></svg>' > dist/trophies.svg
          fi

      # ============================
      # 📈 ACTIVITY GRAPH
      # ============================
      - name: Generate Activity Graph
        run: |
          GRAPH_URL="https://github-readme-activity-graph.vercel.app/graph?username=Chakshu1221&bg_color=0D1117&color=6C5CE7&line=FFD700&point=FFFFFF&area=true&hide_border=true"

          SUCCESS=false
          for i in 1 2 3; do
            echo "⏳ Attempt $i — Fetching activity graph..."
            curl -s -L --max-time 30 "$GRAPH_URL" -o dist/activity-graph.svg
            if [ -f dist/activity-graph.svg ] && grep -q "<svg" dist/activity-graph.svg; then
              echo "✅ Activity Graph SVG downloaded successfully!"
              SUCCESS=true
              break
            fi
            echo "⚠️ Attempt $i failed, waiting 20s..."
            sleep 20
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ Activity graph failed — creating placeholder"
            echo '<svg xmlns="http://www.w3.org/2000/svg" width="850" height="300"><rect width="850" height="300" fill="#0D1117" rx="4.5"/><text x="425" y="155" fill="#6C5CE7" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16">Activity Graph temporarily unavailable</text></svg>' > dist/activity-graph.svg
          fi

      # ============================
      # 📋 SUMMARY
      # ============================
      - name: List generated files
        run: |
          echo "========================================="
          echo "📋 Generated SVG files:"
          echo "========================================="
          ls -lah dist/
          echo "========================================="
          echo ""
          for f in dist/*.svg; do
            if grep -q "<svg" "$f" 2>/dev/null; then
              echo "✅ $(basename $f) — valid SVG"
            else
              echo "❌ $(basename $f) — INVALID or missing"
            fi
          done

      # ============================
      # 🚀 PUSH TO OUTPUT BRANCH
      # ============================
      - name: Push all SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
          commit_message: "chore: update all profile stats"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
